<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grouping form elements </title>
</head>
<body>
    <h1>Grouping form elements </h1>
    <form>
      <fieldset>
        <legend><h2>Your data</h2></legend>
        <label>Name</label>
        <input type="text"  id="t1" placeholder="Name"><br>
        <label>Email</label>
        <input type="email" id="t2" placeholder="Email"><br>
        <label>Date of birth</label>
        <input type="date" id="t3">
      </fieldset>
    
      <fieldset>
        <legend><h2>Input</h2></legend>
        <input type="submit">
        <input type="reset">
      </fieldset>
    </form>
    
</body>
</html>
