<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dialog</title>
	<style>
	  dialog {background: lightgrey;}
	</style>
</head>
<body>
    <h1>Dialogue box with dialog</h1>
  
	<dialog id="dialog1" open>
		<p>Exit dialog?<br>
		  <input type="button" value="Close"
				 onclick="document.getElementById('dialog1').close()">
		</p>
	  </dialog>
	
	
</body>
</html>
