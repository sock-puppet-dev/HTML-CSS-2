<!doctype html>
<html>

<head>
    <title>Creating a navigation and menus via lists</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style2.css" rel="stylesheet">
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/menu.js"></script>
</head>

<body>
    <nav>
        <div class="menubutton">
            <a href="#" class="closed">&#9776; &nbsp; Navigation</a>
        </div>
        <div class="ul-list">
            <ul class="menu">
                <li class="logo"><img src="graphics/logo.png" height="30"></li>
                <li class="menu-item"><a href="#">Home</a></li>
                <li class="menu-item"><a href="#">News</a></li>
                <li class="menu-item"><a href="#">About me</a></li>
                <li class="menu-item"><a href="#">Contact</a></li>
                <li class="menu-item"><a href="#">Privacy</a></li>
                <li class="menu-item button"><a href="#">Sign in</a></li>
            </ul>
        </div>

    </nav>


</body>

</html>
