<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <h1>Contact form</h1>
    <form id="myForm" method="post">
        <fieldset>
            <div>
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" placeholder="Your name">
            </div>
            <div>
                <label for="vname">First name:</label>
                <input type="text" name="vname" id="vname" placeholder="Your first name">
            </div>
            <div>
                <label for="mail">Email:</label>
                <input type="email" name="mail" id="mail" placeholder="Email address" required>
                <label for="mail"></label>
            </div>
            <div>
                <label for="geboren">Year of birth:</label>
                <input type="number" name="geboren" id="geboren" min="1920" max="2015" value="1990">
            </div>
            <div class="form_radio">
                <label>Gender:</label>
                <input type="radio" name="geschlecht" id="male" value="male" class="nobreak">
                <label for="male" class="nobreak">Male</label>
                <input type="radio" name="geschlecht" id="female" value="female" class="nobreak">
                <label for="female" class="nobreak">Female</label>
            </div>
            <div>
                <label for="nachricht">Your message:</label>
                <textarea name="nachricht" id="nachricht" placeholder="Enter message here..." rows="8" required></textarea>
                <label for="nachricht"></label>
            </div>
            <div>
                <input type="checkbox" name="reply" id="reply" value="reply" class="nobreak" required>
                <label for="reply" class="nobreak">GDPR consent (<a href="#">Privacy policy</a>)</label>
            </div>
            <div>
                <input name="absenden" type="submit" value="Submit" class="nobreak">
                <input name="Reset" type="reset" value="Reset" class="nobreak">
            </div>
            <p>(⨉) = Input required</p>
        </fieldset>
    </form>
</body>

</html>
