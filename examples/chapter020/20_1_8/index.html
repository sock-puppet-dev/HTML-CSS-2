<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Unit conversion</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script src="js/convert.js"></script>
</head>

<body>

    <h1>Unit conversion</h1>
    <form>
        <fieldset>
            <legend>Convert meters to miles and yards</legend>
            <label>Meters:</label>
            <input type="number" id="meter" placeholder="Value in Meters" onkeyup="recalculate(this.value);"> m
            <br><label>Miles:</label>
            <input type="number" id="meilen" placeholder="conversation to miles" readonly> mi
            <br><label>Yards:</label>
            <input type="number" id="yard" placeholder="conversation to yards" readonly> yds
        </fieldset>
    </form>


</body>

</html>
