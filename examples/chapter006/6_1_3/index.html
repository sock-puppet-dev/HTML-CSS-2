<!doctype html>
<html lang="de">
  <head>
    <title>Labeling images using figure and figcaption</title>
    <meta charset="UTF-8">
    <style>
      figure { max-width: 400px;
               border: 1px black solid;
               text-align: center;
               padding: 10px;   
      }
    </style>
  </head>
  <body>
  <h1>Tel Aviv Yafo</h1>
  <figure>
    <img src="images/painter.jpg" alt="Painter in Tel Aviv"
     width="400" height="256"><br>
     <figcaption>The scenery in front of the old port of Yafo in
      Tel Aviv is just perfect for painting.</figcaption>
  </figure> 
  </body>
</html>
